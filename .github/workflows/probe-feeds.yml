# TEMPORARY diagnostic — delete before merging to main.
# Final check: run the REAL ingest pipeline from a runner, because that is the only place the 403s are
# observable. Locally this same command reports 0 failed while CI silently drops feeds.
name: probe-feeds
on:
  push:
    branches: [claude/unblock-feeds]
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests
        run: node --test scripts/lib/*.test.mjs
      - name: Real ingest dry-run from a datacenter IP
        run: node scripts/ingest.mjs --dry-run
