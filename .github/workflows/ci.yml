name: CI

# Quality gate: unit tests + a strict build (fails on any markup artifact / unfilled placeholder).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests
        run: node --test scripts/lib/*.test.mjs
      - name: Strict build check
        run: node scripts/generate-index.mjs --strict
